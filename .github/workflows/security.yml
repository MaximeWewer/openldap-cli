name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run gosec
        uses: securego/gosec@v2.27.1
        with:
          # -no-fail: report only (findings show in the Security tab, CI stays green)
          # scope to Go packages so it skips tests/data (container runtime, not Go)
          args: "-no-fail -fmt sarif -out results.sarif ./cmd/... ./internal/..."

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
